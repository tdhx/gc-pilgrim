<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPCP Parish Calendar</title>
  <link rel="stylesheet" href="styles.css?v=19">
</head>
<body data-theme="spcp">
  <header class="page-header">
    <div class="brand-lockup">
      <img
        class="parish-logo"
        src="assets/spcp-logo.png"
        alt="Surfers Paradise Catholic Parish"
        width="512"
        height="160"
      >
    </div>
    <div class="header-copy">
      <p class="eyebrow">Parish life, at a glance</p>
      <h1>Calendar</h1>
    </div>
  </header>

  <main class="page-shell">
    <aside id="filters" class="filters" aria-label="Calendar filters">
      <div class="filters-heading">
        <h2>Filters</h2>
        <div class="filters-heading-actions">
          <button class="text-button" type="button" data-show-all>Clear filters</button>
        </div>
      </div>

      <div id="filters-content">
        <button class="mobile-show-all" type="button" data-show-all>Clear filters</button>
        <label class="search-field">
          <span>Search events</span>
          <input id="search" type="search" placeholder="Event, church or presider">
        </label>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="event-type-filters">
              <span>Event type</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="event-type-filters" class="checkbox-list"></div>
        </fieldset>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="church-filters">
              <span>Church</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="church-filters" class="checkbox-list"></div>
        </fieldset>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="presider-filters">
              <span>Presider</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="presider-filters" class="checkbox-list"></div>
        </fieldset>
      </div>
    </aside>

    <section class="calendar-panel" aria-live="polite">
      <div class="results-header">
        <button
          id="filters-toggle"
          class="results-filter-button"
          type="button"
          aria-expanded="false"
          aria-controls="filters-content"
        >
          <span>Filters</span>
          <span class="filter-toggle-icon" aria-hidden="true"></span>
        </button>
        <h2 class="results-summary">
          <span id="results-context">Weekly</span>
          <span aria-hidden="true">·</span>
          <span id="results-count">Loading events...</span>
        </h2>
        <button id="results-today" class="secondary-button" type="button">Today</button>
      </div>

      <div class="calendar-toolbar">
        <div class="view-switcher" role="tablist" aria-label="Calendar view">
          <button
            id="view-daily"
            class="view-button"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="events"
            tabindex="-1"
            data-view="daily"
          >Daily</button>
          <button
            id="view-weekly"
            class="view-button"
            type="button"
            role="tab"
            aria-selected="true"
            aria-controls="events"
            tabindex="0"
            data-view="weekly"
          >Weekly</button>
          <button
            id="view-monthly"
            class="view-button"
            type="button"
            role="tab"
            aria-selected="false"
            aria-controls="events"
            tabindex="-1"
            data-view="monthly"
          >Monthly</button>
        </div>
        <div id="period-navigation" class="period-navigation" hidden>
          <button id="previous-period" class="period-button" type="button">Previous</button>
          <button id="next-period" class="period-button" type="button">Next</button>
        </div>
      </div>

      <div id="error-message" class="message error-message" hidden></div>
      <div id="empty-message" class="message" hidden>
        <h3>No matching events</h3>
        <p>Try clearing one or more filters.</p>
      </div>
      <div
        id="events"
        class="calendar-view"
        role="tabpanel"
        aria-labelledby="view-weekly"
      ></div>
      <footer class="calendar-footer">
        <a href="diagnostics.html">Feed diagnostics</a>
      </footer>
    </section>
  </main>

  <template id="event-template">
    <article class="event-card">
      <div class="event-details">
        <div class="event-heading">
          <h3 class="event-church"></h3>
          <span class="event-service"></span>
        </div>
        <div class="event-meta">
          <p class="event-time"></p>
          <p class="event-presider"></p>
        </div>
        <p class="event-subtitle"></p>
        <div class="event-tags"></div>
      </div>
    </article>
  </template>

  <script type="module" src="app.js?v=23"></script>
</body>
</html>
