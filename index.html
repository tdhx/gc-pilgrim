<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPCP Parish Calendar</title>
  <link rel="stylesheet" href="styles.css?v=15">
</head>
<body data-theme="spcp">
  <header class="page-header">
    <div class="brand-lockup">
      <img
        class="parish-logo"
        src="assets/spcp-logo.png"
        alt="Surfers Paradise Catholic Parish"
        width="512"
        height="160"
      >
    </div>
    <div class="header-copy">
      <p class="eyebrow">Parish life, at a glance</p>
      <h1>Calendar</h1>
      <p class="intro">Masses, sacraments and parish events for the coming three months.</p>
    </div>
  </header>

  <main class="page-shell">
    <aside id="filters" class="filters" aria-label="Calendar filters">
      <div class="filters-heading">
        <h2>Filters</h2>
        <div class="filters-heading-actions">
          <button id="reset-filters" class="text-button" type="button">Reset</button>
          <button
            id="filters-toggle"
            class="filters-panel-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="filters-content"
            aria-label="Collapse calendar filters"
          >
            <span class="filter-toggle-icon" aria-hidden="true"></span>
          </button>
        </div>
      </div>

      <div id="filters-content">
        <label class="search-field">
          <span>Search events</span>
          <input id="search" type="search" placeholder="Event, church or presider">
        </label>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="event-type-filters">
              <span>Event type</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="event-type-filters" class="checkbox-list"></div>
        </fieldset>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="church-filters">
              <span>Church</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="church-filters" class="checkbox-list"></div>
        </fieldset>

        <fieldset class="filter-section">
          <legend>
            <button class="filter-toggle" type="button" aria-expanded="true" aria-controls="presider-filters">
              <span>Presider</span>
              <span class="filter-toggle-icon" aria-hidden="true"></span>
            </button>
          </legend>
          <div id="presider-filters" class="checkbox-list"></div>
        </fieldset>
      </div>
    </aside>

    <section class="calendar-panel" aria-live="polite">
      <div class="results-header">
        <div>
          <p class="eyebrow">Chronological view</p>
          <h2 id="results-count">Loading events...</h2>
        </div>
        <button id="clear-filters" class="secondary-button" type="button">Show all</button>
      </div>

      <details id="diagnostics" class="diagnostics" hidden>
        <summary id="diagnostics-summary">Feed diagnostics</summary>
        <div id="diagnostics-body" class="diagnostics-body"></div>
      </details>
      <div id="error-message" class="message error-message" hidden></div>
      <div id="empty-message" class="message" hidden>
        <h3>No matching events</h3>
        <p>Try clearing one or more filters.</p>
      </div>
      <div id="events" class="timeline"></div>
    </section>
  </main>

  <template id="event-template">
    <article class="event-card">
      <div class="event-date">
        <span class="event-day"></span>
        <strong class="event-number"></strong>
        <span class="event-month"></span>
      </div>
      <div class="event-details">
        <div class="event-heading">
          <h3 class="event-church"></h3>
          <span class="event-service"></span>
        </div>
        <p class="event-time"></p>
        <p class="event-presider"></p>
        <p class="event-subtitle"></p>
        <div class="event-tags"></div>
      </div>
    </article>
  </template>

  <script type="module" src="app.js?v=19"></script>
</body>
</html>
