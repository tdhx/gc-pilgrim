<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Feed Diagnostics · GC Pilgrim</title>
  <link rel="stylesheet" href="styles.css?v=30">
</head>
<body data-theme="spcp">
  <header class="page-header">
    <div class="brand-lockup">
      <img
        class="parish-logo"
        id="parish-logo"
        src="assets/spcp-logo.png"
        alt="Surfers Paradise Catholic Parish"
        width="512"
        height="160"
      >
    </div>
    <div class="header-copy">
      <p class="eyebrow">Calendar data</p>
      <h1>Diagnostics</h1>
    </div>
  </header>

  <main class="diagnostics-page">
    <a id="calendar-link" class="back-link" href="index.html">&larr; Back to calendar</a>
    <section class="diagnostics-card">
      <p class="eyebrow">Published feed</p>
      <h2 id="diagnostics-title">Loading diagnostics...</h2>
      <div id="diagnostics-body" class="diagnostics-body"></div>
      <div id="diagnostics-error" class="message error-message" hidden></div>
    </section>
  </main>

  <script type="module" src="diagnostics.js?v=5"></script>
</body>
</html>
